<svg width="100" height="120" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield background -->
  <path d="M10 20 C10 10, 20 5, 50 5 C80 5, 90 10, 90 20 L90 70 C90 90, 70 110, 50 115 C30 110, 10 90, 10 70 Z" 
        fill="url(#shieldGradient)" stroke="#0066cc" stroke-width="2"/>
  
  <!-- Brain silhouette -->
  <g transform="translate(30, 35)">
    <path d="M5 15 C5 5, 15 0, 20 5 C25 0, 35 5, 35 15 C35 20, 30 25, 25 25 L15 25 C10 25, 5 20, 5 15 Z" 
          fill="#003d7a"/>
    <!-- Brain details -->
    <path d="M8 12 C12 10, 16 12, 20 10 M22 12 C26 10, 30 12, 32 14" 
          stroke="#66b3ff" stroke-width="1" fill="none"/>
    <path d="M8 16 C12 14, 16 16, 20 14 M22 16 C26 14, 30 16, 32 18" 
          stroke="#4da6ff" stroke-width="1" fill="none"/>
  </g>
  
  <!-- City buildings at bottom -->
  <g transform="translate(25, 75)">
    <rect x="0" y="15" width="8" height="20" fill="#4da6ff"/>
    <rect x="12" y="10" width="8" height="25" fill="#66b3ff"/>
    <rect x="24" y="5" width="8" height="30" fill="#4da6ff"/>
    <rect x="36" y="12" width="8" height="23" fill="#66b3ff"/>
  </g>
  
  <!-- Water droplet -->
  <circle cx="25" cy="30" r="4" fill="#0099ff"/>
  <path d="M25 26 C23 28, 23 32, 25 34 C27 32, 27 28, 25 26 Z" fill="#0066cc"/>
  
  <!-- Lightning bolt -->
  <path d="M75 28 L72 35 L75 35 L73 42 L78 32 L75 32 Z" fill="#66cc66"/>
  
  <!-- Environmental icon -->
  <circle cx="20" cy="55" r="3" fill="#66cc66"/>
  <path d="M20 52 C18 54, 18 56, 20 58 C22 56, 22 54, 20 52 Z" fill="#4da6ff"/>
  
  <!-- Waste management icon -->
  <rect x="72" y="50" width="6" height="8" fill="#003d7a" rx="1"/>
  <rect x="74" y="48" width="2" height="2" fill="#003d7a"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="shieldGradient" gradientTransform="rotate(45)">
      <stop offset="0%" stop-color="#e6f3ff"/>
      <stop offset="50%" stop-color="#b3d9ff"/>
      <stop offset="100%" stop-color="#80bfff"/>
    </linearGradient>
  </defs>
</svg>